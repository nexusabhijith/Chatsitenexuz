<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anon Video Chat 🔥</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0a0a0a;
  color: #00ff9f;
  font-family: 'Courier New', monospace;
}

/* HEADER */
.header {
  padding: 15px;
  text-align: center;
  border-bottom: 1px solid #00ff9f33;
}

.header h1 {
  font-size: 22px;
}

/* MAIN LAYOUT */
.container {
  display: flex;
  flex-direction: column;
  padding: 10px;
}

/* VIDEO SECTION */
.video-box {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

video {
  background: black;
  border: 1px solid #00ff9f55;
  border-radius: 10px;
  width: 100%;
  max-width: 300px;
}

/* CHAT BOX */
#chat {
  margin-top: 10px;
  height: 200px;
  overflow-y: auto;
  border: 1px solid #00ff9f33;
  padding: 10px;
  border-radius: 10px;
}

/* INPUT AREA */
.controls {
  margin-top: 10px;
  display: flex;
  gap: 5px;
}

input, select, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
}

input {
  flex: 1;
}

button {
  background: #00ff9f;
  color: black;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #00cc7a;
}

/* RULES */
.rules {
  margin-top: 15px;
  padding: 10px;
  border: 1px solid #ff444433;
  border-radius: 10px;
  font-size: 13px;
}

/* TELEGRAM BUTTON */
.telegram {
  margin-top: 10px;
  text-align: center;
}

.telegram a {
  text-decoration: none;
  color: black;
  background: #00ff9f;
  padding: 10px 15px;
  border-radius: 10px;
  display: inline-block;
}

/* DESKTOP */
@media (min-width: 768px) {
  .container {
    flex-direction: row;
    gap: 15px;
  }

  .left, .right {
    flex: 1;
  }

  #chat {
    height: 300px;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>🔥 Anonymous Video Chat</h1>
</div>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">

    <div class="video-box">
      <video id="myVideo" autoplay muted playsinline></video>
      <video id="userVideo" autoplay playsinline></video>
    </div>

    <div id="chat"></div>

    <div class="controls">
      <input id="msg" placeholder="Type message..." />
      <button onclick="sendMsg()">Send</button>
      <button onclick="nextUser()">Next</button>
    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="right">

    <!-- GENDER FILTER -->
    <div class="controls">
      <select id="gender">
        <option value="any">I am: Any</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>

      <select id="looking">
        <option value="any">Looking: Any</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>

      <button onclick="startChat()">Start</button>
    </div>

    <!-- RULES -->
    <div class="rules">
      <h3>⚠️ Do & Don't</h3>
      <p>✅ Be respectful</p>
      <p>✅ Keep it friendly</p>
      <p>✅ Report bad users</p>
      <br>
      <p>❌ No nudity</p>
      <p>❌ No abuse / hate</p>
      <p>❌ No spam</p>
    </div>

    <!-- TELEGRAM -->
    <div class="telegram">
      <a href="https://t.me/yourchannel" target="_blank">
        Join Telegram 🚀
      </a>
    </div>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let localStream;
let peerConnection;

const myVideo = document.getElementById("myVideo");
const userVideo = document.getElementById("userVideo");

const config = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

async function startVideo() {
  localStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });
  myVideo.srcObject = localStream;
}

function createPeer() {
  peerConnection = new RTCPeerConnection(config);

  localStream.getTracks().forEach(track => {
    peerConnection.addTrack(track, localStream);
  });

  peerConnection.ontrack = e => {
    userVideo.srcObject = e.streams[0];
  };

  peerConnection.onicecandidate = e => {
    if (e.candidate) {
      socket.emit("ice-candidate", e.candidate);
    }
  };
}

socket.on("message", async msg => {
  document.getElementById("chat").innerHTML += "<p>"+msg+"</p>";

  if (msg === "Connected!") {
    createPeer();

    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);

    socket.emit("offer", offer);
  }
});

socket.on("offer", async offer => {
  createPeer();
  await peerConnection.setRemoteDescription(offer);

  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);

  socket.emit("answer", answer);
});

socket.on("answer", async answer => {
  await peerConnection.setRemoteDescription(answer);
});

socket.on("ice-candidate", async candidate => {
  if (peerConnection) {
    await peerConnection.addIceCandidate(candidate);
  }
});

function sendMsg(){
  let msg = document.getElementById("msg").value;
  socket.emit("message", msg);
  document.getElementById("msg").value = "";
}

function nextUser(){
  socket.emit("next");

  if (peerConnection) {
    peerConnection.close();
    peerConnection = null;
  }

  userVideo.srcObject = null;
}

function startChat() {
  const gender = document.getElementById("gender").value;
  const looking = document.getElementById("looking").value;

  socket.emit("join", { gender, looking });
}

startVideo();
</script>

</body>
</html>
